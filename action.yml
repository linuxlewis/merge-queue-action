name: 'Merge Queue'
description: 'Lightweight merge queue for GitHub Actions. No Enterprise required.'
author: 'Sam Bolgert'

inputs:
  github-token:
    description: 'GitHub token (use a GitHub App token to trigger CI on branch updates)'
    required: true
  read-token:
    description: 'Token for reading check runs and commit statuses (defaults to github-token). Use GITHUB_TOKEN if your App token lacks checks:read.'
    required: false
    default: ''
  rerun-token:
    description: 'Token for rerunning failed GitHub Actions jobs (defaults to github-token). Use GITHUB_TOKEN with actions:write if your App token cannot rerun workflows.'
    required: false
    default: ''
  base-branch:
    description: 'Base branch to merge into'
    required: false
    default: 'master'
  label:
    description: 'Label that marks PRs for the queue'
    required: false
    default: 'queue'
  merge-method:
    description: 'Merge method: squash, merge, or rebase'
    required: false
    default: 'squash'
  max-ci-reruns:
    description: 'Maximum number of failed GitHub Actions job reruns per PR head commit before dequeuing. Set to 0 to disable reruns.'
    required: false
    default: '3'
  gh-version:
    description: 'GitHub CLI version to install on Linux runners when gh is missing'
    required: false
    default: '2.89.0'
  jq-version:
    description: 'jq version to install on Linux runners when jq is missing'
    required: false
    default: '1.8.1'

runs:
  using: 'composite'
  steps:
    - name: Ensure GitHub CLI tools are installed
      if: runner.os == 'Linux'
      shell: bash
      env:
        GH_CLI_VERSION: ${{ inputs.gh-version }}
        JQ_VERSION: ${{ inputs.jq-version }}
      run: |
        set -euo pipefail

        if ! command -v tar >/dev/null 2>&1; then
          echo "::error::tar is required to install gh automatically."
          exit 1
        fi

        ARCH=$(uname -m)
        case "$ARCH" in
          x86_64|amd64)
            GH_ARCH='amd64'
            ;;
          aarch64|arm64)
            GH_ARCH='arm64'
            ;;
          *)
            echo "::error::Unsupported Linux architecture for gh installation: $ARCH"
            exit 1
            ;;
        esac

        download() {
          local url=$1
          local output=$2

          if command -v curl >/dev/null 2>&1; then
            curl -fsSL "$url" -o "$output"
            return 0
          fi

          if command -v wget >/dev/null 2>&1; then
            wget -qO "$output" "$url"
            return 0
          fi

          echo "::error::Either curl or wget is required to install gh automatically."
          exit 1
        }

        TEMP_DIR="${RUNNER_TEMP:-/tmp}"
        BIN_DIR="$TEMP_DIR/action-tools-bin"
        ARCHIVE_NAME="gh_${GH_CLI_VERSION}_linux_${GH_ARCH}.tar.gz"
        ARCHIVE_PATH="$TEMP_DIR/$ARCHIVE_NAME"
        EXTRACT_DIR="$TEMP_DIR/gh-${GH_CLI_VERSION}-${GH_ARCH}"

        mkdir -p "$EXTRACT_DIR" "$BIN_DIR"

        if command -v gh >/dev/null 2>&1; then
          echo "gh already installed: $(gh --version | head -n 1)"
        else
          download \
            "https://github.com/cli/cli/releases/download/v${GH_CLI_VERSION}/${ARCHIVE_NAME}" \
            "$ARCHIVE_PATH"
          tar -xzf "$ARCHIVE_PATH" -C "$EXTRACT_DIR"
          cp "$EXTRACT_DIR/gh_${GH_CLI_VERSION}_linux_${GH_ARCH}/bin/gh" "$BIN_DIR/gh"
          chmod 0755 "$BIN_DIR/gh"
          echo "Installed gh: $("$BIN_DIR/gh" --version | head -n 1)"
        fi

        if command -v jq >/dev/null 2>&1; then
          echo "jq already installed: $(jq --version)"
        else
          download \
            "https://github.com/jqlang/jq/releases/download/jq-${JQ_VERSION}/jq-linux-${GH_ARCH}" \
            "$BIN_DIR/jq"
          chmod 0755 "$BIN_DIR/jq"
          echo "Installed jq: $("$BIN_DIR/jq" --version)"
        fi

        echo "$BIN_DIR" >> "$GITHUB_PATH"

    - name: Process merge queue
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_READ_TOKEN: ${{ inputs.read-token != '' && inputs.read-token || inputs.github-token }}
        GH_RERUN_TOKEN: ${{ inputs.rerun-token != '' && inputs.rerun-token || inputs.github-token }}
        REPO: ${{ github.repository }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        QUEUE_LABEL: ${{ inputs.label }}
        MERGE_METHOD: ${{ inputs.merge-method }}
        MAX_CI_RERUNS: ${{ inputs.max-ci-reruns }}
      run: |
        set -euo pipefail

        if ! [[ "$MAX_CI_RERUNS" =~ ^[0-9]+$ ]]; then
          echo "::error::max-ci-reruns must be a non-negative integer. Got: $MAX_CI_RERUNS"
          exit 1
        fi

        echo "::group::Finding queued PRs"

        QUEUED_PRS=$(gh pr list \
          --repo "$REPO" \
          --label "$QUEUE_LABEL" \
          --state open \
          --base "$BASE_BRANCH" \
          --json number,title,labels,createdAt \
          --jq 'sort_by(.createdAt) | .[].number')

        if [ -z "$QUEUED_PRS" ]; then
          echo "No PRs in queue. Done."
          exit 0
        fi

        echo "Queued PRs (FIFO order): $QUEUED_PRS"
        echo "::endgroup::"

        PR_NUM=$(echo "$QUEUED_PRS" | head -1)
        echo "::group::Processing PR #$PR_NUM"

        ENCODED_BASE=$(printf '%s' "$BASE_BRANCH" | jq -sRr @uri)

        # Match GitHub's configured review requirements instead of requiring
        # approval unconditionally.
        BRANCH_RULES='[]'
        RULES_ERROR=$(mktemp)
        if BRANCH_RULES=$(gh api "/repos/$REPO/rules/branches/$ENCODED_BASE" --paginate 2>"$RULES_ERROR" | jq -s 'add // []'); then
          PULL_REQUEST_RULE_COUNT=$(echo "$BRANCH_RULES" | jq '[.[] | select(.type == "pull_request")] | length')
        else
          RULES_MESSAGE=$(tr '\n' ' ' < "$RULES_ERROR")
          echo "::warning::Could not read active branch rules for $BASE_BRANCH. Falling back to legacy branch protection when available. $RULES_MESSAGE"
          PULL_REQUEST_RULE_COUNT=0
        fi
        rm -f "$RULES_ERROR"

        RULESET_REVIEW_REQUIREMENT_COUNT=$(echo "$BRANCH_RULES" | jq '
          [
            .[]
            | select(.type == "pull_request")
            | (.parameters // {})
            | select(
                ((.required_approving_review_count // 0) > 0) or
                (.require_code_owner_review // false) or
                (.require_last_push_approval // false) or
                ((.required_reviewers // []) | map(select((.minimum_approvals // 0) > 0)) | length > 0)
              )
          ]
          | length
        ')
        RULESET_REQUIRED_APPROVALS=$(echo "$BRANCH_RULES" | jq '[.[] | select(.type == "pull_request") | ((.parameters // {}).required_approving_review_count // 0)] | max // 0')

        LEGACY_REVIEW_REQUIRED=false
        LEGACY_REQUIRED_APPROVALS=0
        LEGACY_ERROR=$(mktemp)
        if LEGACY_REVIEW_PROTECTION=$(gh api "/repos/$REPO/branches/$ENCODED_BASE/protection/required_pull_request_reviews" 2>"$LEGACY_ERROR"); then
          LEGACY_REVIEW_REQUIRED=$(echo "$LEGACY_REVIEW_PROTECTION" | jq -r '
            ((.required_approving_review_count // 0) > 0) or
            (.require_code_owner_reviews // false) or
            (.require_last_push_approval // false)
          ')
          LEGACY_REQUIRED_APPROVALS=$(echo "$LEGACY_REVIEW_PROTECTION" | jq -r '.required_approving_review_count // 0')
        else
          LEGACY_MESSAGE=$(tr '\n' ' ' < "$LEGACY_ERROR")
          if ! echo "$LEGACY_MESSAGE" | grep -qiE 'branch not protected|not found'; then
            echo "::notice::Could not read legacy pull request review protection for $BASE_BRANCH. GitHub will still enforce it during merge. $LEGACY_MESSAGE"
          fi
        fi
        rm -f "$LEGACY_ERROR"

        REVIEW_REQUIRED=false
        if [ "$RULESET_REVIEW_REQUIREMENT_COUNT" -gt 0 ] || [ "$LEGACY_REVIEW_REQUIRED" = "true" ]; then
          REVIEW_REQUIRED=true
        fi

        if [ "$REVIEW_REQUIRED" = "true" ]; then
          echo "Branch rules require review approval. Ruleset required approvals: $RULESET_REQUIRED_APPROVALS. Legacy required approvals: $LEGACY_REQUIRED_APPROVALS."
          APPROVED=$(gh pr view "$PR_NUM" --repo "$REPO" --json reviewDecision --jq '.reviewDecision')
          if [ "$APPROVED" != "APPROVED" ]; then
            echo "PR #$PR_NUM does not satisfy review requirements (status: $APPROVED). Skipping until next cycle."
            echo "::endgroup::"
            exit 0
          fi
        elif [ "$PULL_REQUEST_RULE_COUNT" -gt 0 ]; then
          echo "Active branch pull request rules do not require approval. Skipping approval gate."
        else
          echo "No branch approval requirement detected. Skipping approval gate."
        fi

        # No merge conflicts
        MERGEABLE=$(gh pr view "$PR_NUM" --repo "$REPO" --json mergeable --jq '.mergeable')
        if [ "$MERGEABLE" = "CONFLICTING" ]; then
          echo "PR #$PR_NUM has merge conflicts. Dequeuing."
          gh pr edit "$PR_NUM" --repo "$REPO" --remove-label "$QUEUE_LABEL"
          gh pr comment "$PR_NUM" --repo "$REPO" \
            --body "❌ **Merge Queue:** Removed from queue due to merge conflicts. Please resolve conflicts and re-add the \`$QUEUE_LABEL\` label."
          echo "::endgroup::"
          exit 0
        fi

        # Update branch if behind
        HEAD_REF=$(gh pr view "$PR_NUM" --repo "$REPO" --json headRefName --jq '.headRefName')
        ENCODED_HEAD_REF=$(printf '%s' "$HEAD_REF" | jq -sRr @uri)
        IS_BEHIND=$(gh api "/repos/$REPO/compare/$ENCODED_BASE...$ENCODED_HEAD_REF" --jq '.behind_by')

        if [ "$IS_BEHIND" -gt 0 ]; then
          echo "PR #$PR_NUM is $IS_BEHIND commits behind $BASE_BRANCH. Updating branch..."
          if ! gh api -X PUT "/repos/$REPO/pulls/$PR_NUM/update-branch" \
            --field expected_head_sha="$(gh pr view "$PR_NUM" --repo "$REPO" --json headRefOid --jq '.headRefOid')" \
            2>&1; then
            echo "::warning::Branch update API call failed for PR #$PR_NUM. Will retry next cycle."
          else
            echo "Branch updated. CI will re-run. Will merge on next cycle."
          fi
          echo "::endgroup::"
          exit 0
        fi

        echo "Branch is up to date with $BASE_BRANCH."

        # Check CI status using REST API to capture both check runs and commit
        # statuses. This handles third-party apps (e.g. Devin) that post commit
        # statuses instead of check runs.
        HEAD_SHA=$(gh pr view "$PR_NUM" --repo "$REPO" --json headRefOid --jq '.headRefOid')

        # Use read token for checks/statuses (App tokens may lack checks:read)
        CHECK_RUNS=$(GH_TOKEN="$GH_READ_TOKEN" gh api "/repos/$REPO/commits/$HEAD_SHA/check-runs" \
          --paginate \
          --jq '[.check_runs[] | select(.name | startswith("Merge Queue") | not) | {name: .name, status: .status, conclusion: .conclusion, app_name: (.app.name // ""), app_slug: (.app.slug // ""), check_suite_id: (.check_suite.id // null)}]' \
          | jq -s 'add // []')

        COMMIT_STATUSES=$(GH_TOKEN="$GH_READ_TOKEN" gh api "/repos/$REPO/commits/$HEAD_SHA/status" \
          --jq '[.statuses[] | {context: .context, state: .state}]')

        echo "Check runs: $(echo "$CHECK_RUNS" | jq length)"
        echo "Commit statuses: $(echo "$COMMIT_STATUSES" | jq length)"

        CI_STATE=$(jq -rn \
          --argjson runs "$CHECK_RUNS" \
          --argjson statuses "$COMMIT_STATUSES" \
          '
          # Normalize check runs to a common shape
          ($runs | map(
            if .status != "completed" then {name: .name, state: "PENDING"}
            elif .conclusion == "failure" then {name: .name, state: "FAILURE"}
            elif .conclusion == "cancelled" or .conclusion == "timed_out" or .conclusion == "action_required" then {name: .name, state: "FAILURE"}
            elif .conclusion == "success" or .conclusion == "skipped" or .conclusion == "neutral" then {name: .name, state: "SUCCESS"}
            else {name: .name, state: "UNKNOWN"}
            end
          )) as $norm_runs |

          # Normalize commit statuses to a common shape
          ($statuses | map(
            if .state == "success" then {name: .context, state: "SUCCESS"}
            elif .state == "failure" or .state == "error" then {name: .context, state: "FAILURE"}
            elif .state == "pending" then {name: .context, state: "PENDING"}
            else {name: .context, state: "UNKNOWN"}
            end
          )) as $norm_statuses |

          ($norm_runs + $norm_statuses) |
          if length == 0 then "PENDING"
          elif any(.state == "FAILURE") then "FAILURE"
          elif any(.state == "PENDING") then "PENDING"
          elif all(.state == "SUCCESS") then "SUCCESS"
          else "UNKNOWN"
          end
        ')

        echo "CI state: $CI_STATE"

        case "$CI_STATE" in
          SUCCESS)
            echo "All checks passed! Merging PR #$PR_NUM..."
            if gh pr merge "$PR_NUM" \
              --repo "$REPO" \
              --"$MERGE_METHOD" \
              --delete-branch; then
              echo "✅ PR #$PR_NUM merged successfully!"
            else
              echo "::warning::GitHub rejected the merge for PR #$PR_NUM. It will stay queued and retry next cycle."
            fi
            ;;
          PENDING)
            echo "CI still running for PR #$PR_NUM. Will retry next cycle."
            ;;
          FAILURE)
            FAILED_ACTION_SUITE_IDS=$(echo "$CHECK_RUNS" | jq '
              [
                .[]
                | select(.status == "completed")
                | select(
                    .conclusion == "failure" or
                    .conclusion == "cancelled" or
                    .conclusion == "timed_out" or
                    .conclusion == "action_required"
                  )
                | select(.app_slug == "github-actions" or .app_name == "GitHub Actions")
                | .check_suite_id
                | select(. != null)
              ]
              | unique
            ')

            FAILED_ACTION_SUITE_COUNT=$(echo "$FAILED_ACTION_SUITE_IDS" | jq length)
            FAILED_ACTION_RUNS='[]'

            if [ "$FAILED_ACTION_SUITE_COUNT" -gt 0 ]; then
              # Workflow run_attempt is scoped to the workflow run/check suite for
              # this head SHA, so retry budgets reset on new commits or branch updates.
              FAILED_ACTION_RUNS=$(GH_TOKEN="$GH_READ_TOKEN" gh api "/repos/$REPO/actions/runs?head_sha=$HEAD_SHA&per_page=100" \
                --paginate \
                --jq '.workflow_runs[] | {id: .id, name: .name, conclusion: .conclusion, run_attempt: (.run_attempt // 1), check_suite_id: .check_suite_id, html_url: .html_url}' \
                | jq -s --argjson suite_ids "$FAILED_ACTION_SUITE_IDS" '
                    [
                      .[]
                      | select(.check_suite_id as $suite_id | $suite_ids | index($suite_id))
                      | select(
                          .conclusion == "failure" or
                          .conclusion == "cancelled" or
                          .conclusion == "timed_out" or
                          .conclusion == "action_required"
                        )
                    ]
                  ')
            fi

            FAILED_ACTION_RUN_COUNT=$(echo "$FAILED_ACTION_RUNS" | jq length)
            RERUNNABLE_ACTION_RUNS=$(echo "$FAILED_ACTION_RUNS" | jq --argjson max "$MAX_CI_RERUNS" '[.[] | select((.run_attempt // 1) <= $max)]')
            RERUNNABLE_ACTION_RUN_COUNT=$(echo "$RERUNNABLE_ACTION_RUNS" | jq length)

            if [ "$RERUNNABLE_ACTION_RUN_COUNT" -gt 0 ]; then
              echo "CI failed for PR #$PR_NUM. Re-running failed jobs for $RERUNNABLE_ACTION_RUN_COUNT GitHub Actions workflow run(s)."
              RERUN_FAILED=false

              while read -r run; do
                RUN_ID=$(echo "$run" | jq -r '.id')
                RUN_NAME=$(echo "$run" | jq -r '.name')
                RUN_ATTEMPT=$(echo "$run" | jq -r '.run_attempt')

                echo "Re-running failed jobs for workflow run $RUN_ID ($RUN_NAME), completed attempt $RUN_ATTEMPT. Retry budget: $MAX_CI_RERUNS."
                RERUN_ERROR=$(mktemp)
                if ! GH_TOKEN="$GH_RERUN_TOKEN" gh api -X POST "/repos/$REPO/actions/runs/$RUN_ID/rerun-failed-jobs" >/dev/null 2>"$RERUN_ERROR"; then
                  RERUN_MESSAGE=$(tr '\n' ' ' < "$RERUN_ERROR")
                  echo "::warning::Could not rerun failed jobs for workflow run $RUN_ID ($RUN_NAME). $RERUN_MESSAGE"
                  RERUN_FAILED=true
                fi
                rm -f "$RERUN_ERROR"
              done < <(echo "$RERUNNABLE_ACTION_RUNS" | jq -c '.[]')

              if [ "$RERUN_FAILED" = "true" ]; then
                DEQUEUE_REASON="CI failed, and the action could not request a GitHub Actions rerun. Check that the token passed as rerun-token, or github-token when rerun-token is unset, has Actions: write permission on this repository."
                echo "$DEQUEUE_REASON Dequeuing PR #$PR_NUM."
                gh pr edit "$PR_NUM" --repo "$REPO" --remove-label "$QUEUE_LABEL"
                gh pr comment "$PR_NUM" --repo "$REPO" \
                  --body "❌ **Merge Queue:** Removed from queue because $DEQUEUE_REASON Please fix the token permissions or re-add the \`$QUEUE_LABEL\` label after CI is fixed."
                echo "::endgroup::"
                exit 0
              fi

              echo "Failed jobs were re-run. PR #$PR_NUM will stay queued and be checked again next cycle."
              echo "::endgroup::"
              exit 0
            fi

            if [ "$FAILED_ACTION_SUITE_COUNT" -eq 0 ]; then
              DEQUEUE_REASON="CI checks failed, but no failed GitHub Actions jobs were found to rerun."
            elif [ "$FAILED_ACTION_RUN_COUNT" -eq 0 ]; then
              DEQUEUE_REASON="CI checks failed, but no matching failed GitHub Actions workflow runs were found for the current head commit."
            else
              DEQUEUE_REASON="CI failed after $MAX_CI_RERUNS allowed rerun(s) for the current head commit."
            fi

            echo "$DEQUEUE_REASON Dequeuing PR #$PR_NUM."
            gh pr edit "$PR_NUM" --repo "$REPO" --remove-label "$QUEUE_LABEL"
            gh pr comment "$PR_NUM" --repo "$REPO" \
              --body "❌ **Merge Queue:** Removed from queue because $DEQUEUE_REASON Please fix the failures or push an update, then re-add the \`$QUEUE_LABEL\` label."
            ;;
          *)
            echo "Unknown CI state: $CI_STATE. Will retry next cycle."
            ;;
        esac

        echo "::endgroup::"

branding:
  icon: 'git-merge'
  color: 'green'
