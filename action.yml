name: 'Merge Queue'
description: 'Lightweight merge queue for GitHub Actions. No Enterprise required.'
author: 'Sam Bolgert'

inputs:
  github-token:
    description: 'GitHub token (use a GitHub App token to trigger CI on branch updates)'
    required: true
  read-token:
    description: 'Token for reading check runs and commit statuses (defaults to github-token). Use GITHUB_TOKEN if your App token lacks checks:read.'
    required: false
    default: ''
  base-branch:
    description: 'Base branch to merge into'
    required: false
    default: 'master'
  label:
    description: 'Label that marks PRs for the queue'
    required: false
    default: 'queue'
  merge-method:
    description: 'Merge method: squash, merge, or rebase'
    required: false
    default: 'squash'

runs:
  using: 'composite'
  steps:
    - name: Process merge queue
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_READ_TOKEN: ${{ inputs.read-token || inputs.github-token }}
        REPO: ${{ github.repository }}
        BASE_BRANCH: ${{ inputs.base-branch }}
        QUEUE_LABEL: ${{ inputs.label }}
        MERGE_METHOD: ${{ inputs.merge-method }}
      run: |
        set -euo pipefail

        echo "::group::Finding queued PRs"

        QUEUED_PRS=$(gh pr list \
          --repo "$REPO" \
          --label "$QUEUE_LABEL" \
          --state open \
          --base "$BASE_BRANCH" \
          --json number,title,labels,createdAt \
          --jq 'sort_by(.createdAt) | .[].number')

        if [ -z "$QUEUED_PRS" ]; then
          echo "No PRs in queue. Done."
          exit 0
        fi

        echo "Queued PRs (FIFO order): $QUEUED_PRS"
        echo "::endgroup::"

        PR_NUM=$(echo "$QUEUED_PRS" | head -1)
        echo "::group::Processing PR #$PR_NUM"

        # Must be approved
        APPROVED=$(gh pr view "$PR_NUM" --repo "$REPO" --json reviewDecision --jq '.reviewDecision')
        if [ "$APPROVED" != "APPROVED" ]; then
          echo "PR #$PR_NUM is not approved (status: $APPROVED). Skipping until next cycle."
          echo "::endgroup::"
          exit 0
        fi

        # No merge conflicts
        MERGEABLE=$(gh pr view "$PR_NUM" --repo "$REPO" --json mergeable --jq '.mergeable')
        if [ "$MERGEABLE" = "CONFLICTING" ]; then
          echo "PR #$PR_NUM has merge conflicts. Dequeuing."
          gh pr edit "$PR_NUM" --repo "$REPO" --remove-label "$QUEUE_LABEL"
          gh pr comment "$PR_NUM" --repo "$REPO" \
            --body "❌ **Merge Queue:** Removed from queue due to merge conflicts. Please resolve conflicts and re-add the \`$QUEUE_LABEL\` label."
          echo "::endgroup::"
          exit 0
        fi

        # Update branch if behind
        HEAD_REF=$(gh pr view "$PR_NUM" --repo "$REPO" --json headRefName --jq '.headRefName')
        ENCODED_HEAD_REF=$(printf '%s' "$HEAD_REF" | jq -sRr @uri)
        ENCODED_BASE=$(printf '%s' "$BASE_BRANCH" | jq -sRr @uri)
        IS_BEHIND=$(gh api "/repos/$REPO/compare/$ENCODED_BASE...$ENCODED_HEAD_REF" --jq '.behind_by')

        if [ "$IS_BEHIND" -gt 0 ]; then
          echo "PR #$PR_NUM is $IS_BEHIND commits behind $BASE_BRANCH. Updating branch..."
          if ! gh api -X PUT "/repos/$REPO/pulls/$PR_NUM/update-branch" \
            --field expected_head_sha="$(gh pr view "$PR_NUM" --repo "$REPO" --json headRefOid --jq '.headRefOid')" \
            2>&1; then
            echo "::warning::Branch update API call failed for PR #$PR_NUM. Will retry next cycle."
          else
            echo "Branch updated. CI will re-run. Will merge on next cycle."
          fi
          echo "::endgroup::"
          exit 0
        fi

        echo "Branch is up to date with $BASE_BRANCH."

        # Check CI status using REST API to capture both check runs and commit
        # statuses. This handles third-party apps (e.g. Devin) that post commit
        # statuses instead of check runs.
        HEAD_SHA=$(gh pr view "$PR_NUM" --repo "$REPO" --json headRefOid --jq '.headRefOid')

        # Use read token for checks/statuses (App tokens may lack checks:read)
        CHECK_RUNS=$(GH_TOKEN="$GH_READ_TOKEN" gh api "/repos/$REPO/commits/$HEAD_SHA/check-runs" \
          --paginate \
          --jq '[.check_runs[] | select(.name | startswith("Merge Queue") | not) | {name: .name, status: .status, conclusion: .conclusion}]' \
          | jq -s 'add // []')

        COMMIT_STATUSES=$(GH_TOKEN="$GH_READ_TOKEN" gh api "/repos/$REPO/commits/$HEAD_SHA/status" \
          --jq '[.statuses[] | {context: .context, state: .state}]')

        echo "Check runs: $(echo "$CHECK_RUNS" | jq length)"
        echo "Commit statuses: $(echo "$COMMIT_STATUSES" | jq length)"

        CI_STATE=$(jq -rn \
          --argjson runs "$CHECK_RUNS" \
          --argjson statuses "$COMMIT_STATUSES" \
          '
          # Normalize check runs to a common shape
          ($runs | map(
            if .status != "completed" then {name: .name, state: "PENDING"}
            elif .conclusion == "failure" then {name: .name, state: "FAILURE"}
            elif .conclusion == "cancelled" or .conclusion == "timed_out" or .conclusion == "action_required" then {name: .name, state: "FAILURE"}
            elif .conclusion == "success" or .conclusion == "skipped" or .conclusion == "neutral" then {name: .name, state: "SUCCESS"}
            else {name: .name, state: "UNKNOWN"}
            end
          )) as $norm_runs |

          # Normalize commit statuses to a common shape
          ($statuses | map(
            if .state == "success" then {name: .context, state: "SUCCESS"}
            elif .state == "failure" or .state == "error" then {name: .context, state: "FAILURE"}
            elif .state == "pending" then {name: .context, state: "PENDING"}
            else {name: .context, state: "UNKNOWN"}
            end
          )) as $norm_statuses |

          ($norm_runs + $norm_statuses) |
          if length == 0 then "PENDING"
          elif any(.state == "FAILURE") then "FAILURE"
          elif any(.state == "PENDING") then "PENDING"
          elif all(.state == "SUCCESS") then "SUCCESS"
          else "UNKNOWN"
          end
        ')

        echo "CI state: $CI_STATE"

        case "$CI_STATE" in
          SUCCESS)
            echo "All checks passed! Merging PR #$PR_NUM..."
            gh pr merge "$PR_NUM" \
              --repo "$REPO" \
              --"$MERGE_METHOD" \
              --delete-branch
            echo "✅ PR #$PR_NUM merged successfully!"
            ;;
          PENDING)
            echo "CI still running for PR #$PR_NUM. Will retry next cycle."
            ;;
          FAILURE)
            echo "CI failed for PR #$PR_NUM. Dequeuing."
            gh pr edit "$PR_NUM" --repo "$REPO" --remove-label "$QUEUE_LABEL"
            gh pr comment "$PR_NUM" --repo "$REPO" \
              --body "❌ **Merge Queue:** Removed from queue because CI checks failed. Please fix the failures and re-add the \`$QUEUE_LABEL\` label."
            ;;
          *)
            echo "Unknown CI state: $CI_STATE. Will retry next cycle."
            ;;
        esac

        echo "::endgroup::"

branding:
  icon: 'git-merge'
  color: 'green'
